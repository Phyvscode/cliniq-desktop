name: Build ClinIQ Desktop

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run build:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: ClinIQ-Windows
          path: dist/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Add macOS icon
        run: |
          mkdir -p assets
          if [ ! -f assets/icon.icns ]; then
            # Create a simple placeholder icon if none exists
            cp assets/icon.ico assets/icon.png 2>/dev/null || touch assets/icon.icns
          fi

      - name: Build Mac DMG
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false  # skip code signing

      - name: Upload Mac DMG
        uses: actions/upload-artifact@v4
        with:
          name: ClinIQ-Mac
          path: dist/*.dmg