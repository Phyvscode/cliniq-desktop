name: Build ClinIQ Desktop

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout cliniq-desktop
        uses: actions/checkout@v4

      - name: Checkout frontend source
        uses: actions/checkout@v4
        with:
          repository: Phyvscode/cliniq-smart-clinic-flow-main
          path: cliniq-source
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build frontend
        working-directory: cliniq-source/frontend
        run: |
          npm install
          npm run build

      - name: Copy frontend dist
        run: |
          New-Item -ItemType Directory -Force frontend\dist
          Copy-Item -Recurse -Force cliniq-source\frontend\dist\* frontend\dist\
        shell: powershell

      - name: Install Electron dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run build:win
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: ClinIQ-Windows
          path: dist/*.exe
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout cliniq-desktop
        uses: actions/checkout@v4

      - name: Checkout frontend source
        uses: actions/checkout@v4
        with:
          repository: Phyvscode/cliniq-smart-clinic-flow-main
          path: cliniq-source
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build frontend
        working-directory: cliniq-source/frontend
        run: |
          npm install
          npm run build

      - name: Copy frontend dist
        run: cp -r cliniq-source/frontend/dist frontend/dist

      - name: Install Electron dependencies
        run: npm install

      - name: Build Mac DMG
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac DMG
        uses: actions/upload-artifact@v4
        with:
          name: ClinIQ-Mac
          path: dist/*.dmg
          retention-days: 30